<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puro Amor Kids - Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'mint': '#9CD3D3', 'mustard': '#F4C873' },
                    fontFamily: { 'heading': ['"Amatic SC"', 'cursive'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Quicksand:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Quicksand', sans-serif
        }

        .drawer-sheet {
            transition: transform 0.3s ease-in-out;
        }

        .drawer-open {
            transform: translateX(0);
        }

        .drawer-closed {
            transform: translateX(-100%);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-900 text-white shadow-md z-20 flex-none h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-6">
            <h1 class="font-heading text-3xl font-bold text-mint">Puro Amor Kids</h1>
            <div class="flex bg-gray-800 rounded-lg p-1">
                <button onclick="switchAppMode('stock')" id="btn-mode-stock"
                    class="px-6 py-2 rounded-md font-bold text-sm transition-colors">STOCK</button>
                <button onclick="switchAppMode('registro')" id="btn-mode-registro"
                    class="px-6 py-2 rounded-md font-bold text-sm transition-colors text-gray-400">REGISTRO</button>
                <button onclick="switchAppMode('vender')" id="btn-mode-vender"
                    class="px-6 py-2 rounded-md font-bold text-sm transition-colors text-gray-400">VENDER</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="save-status" class="text-xs font-bold text-gray-500 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500"></span> Guardado
            </div>
            <div id="stock-actions">
                <button onclick="document.getElementById('import-modal').classList.remove('hidden')"
                    class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-200 transition text-sm mr-2">
                    <i class="fa-solid fa-file-csv mr-2"></i> Importar CSV
                </button>
                <button onclick="openStockDrawer(null)"
                    class="bg-mint text-white px-4 py-2 rounded-lg font-bold hover:brightness-110 transition text-sm">
                    <i class="fa-solid fa-plus mr-2"></i> Nuevo Producto
                </button>
            </div>
            <button onclick="saveToDisk()"
                class="bg-gray-700 text-gray-300 px-3 py-2 rounded-lg font-bold hover:bg-gray-600 transition text-xs flex items-center gap-2">
                <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">Backup</span>
            </button>
            <button onclick="window.loginApp.logout()"
                class="bg-red-500/10 text-red-400 px-3 py-2 rounded-lg font-bold hover:bg-red-500 hover:text-white transition text-xs flex items-center gap-2"
                title="Cerrar Sesión">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">

        <!-- Drawer -->
        <aside id="drawer"
            class="drawer-sheet drawer-closed fixed top-0 left-0 h-screen w-full md:w-[600px] bg-white shadow-2xl z-50 flex flex-col border-r border-gray-200">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50 h-16 flex-none">
                <h2 id="drawer-title" class="text-2xl font-bold text-gray-800"></h2>
                <button onclick="closeDrawer()" class="text-gray-400 hover:text-red-500 text-2xl px-2"><i
                        class="fa-solid fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 text-gray-800" id="drawer-body"></div>
            <div class="p-5 border-t bg-gray-50 flex-none" id="drawer-footer"></div>
        </aside>

        <!-- Main -->
        <main class="flex-1 h-full flex flex-col w-full relative" id="main-area">
            <div class="bg-white px-8 pt-6 border-b flex justify-between items-end flex-none">
                <div class="flex gap-6 overflow-x-auto">
                    <button onclick="filterCategory('Todo')"
                        class="cat-tab pb-3 text-lg font-bold text-gray-400 hover:text-gray-600 border-b-4 border-transparent"
                        data-cat="Todo">Todo</button>
                    <button onclick="filterCategory('Niños')"
                        class="cat-tab pb-3 text-lg font-bold text-gray-400 hover:text-gray-600 border-b-4 border-transparent"
                        data-cat="Niños">Niños</button>
                    <button onclick="filterCategory('Niñas')"
                        class="cat-tab pb-3 text-lg font-bold text-gray-400 hover:text-gray-600 border-b-4 border-transparent"
                        data-cat="Niñas">Niñas</button>
                    <button onclick="filterCategory('No caminantes')"
                        class="cat-tab pb-3 text-lg font-bold text-gray-400 hover:text-gray-600 border-b-4 border-transparent"
                        data-cat="No caminantes">No caminantes</button>
                    <button onclick="filterCategory('Bebés')"
                        class="cat-tab pb-3 text-lg font-bold text-gray-400 hover:text-gray-600 border-b-4 border-transparent"
                        data-cat="Bebés">Bebes RN</button>
                    <button onclick="filterCategory('Ofertas')"
                        class="cat-tab pb-3 text-lg font-bold text-mustard hover:text-yellow-600 border-b-4 border-transparent"
                        data-cat="Ofertas"><i class="fa-solid fa-tag mr-1"></i>Ofertas</button>
                </div>
                <div class="pb-3 relative w-64">
                    <input type="text" id="global-search" oninput="handleSearch(this.value)"
                        placeholder="Buscar producto..."
                        class="w-full pl-10 pr-4 py-2 bg-gray-100 border-transparent focus:bg-white focus:border-mint rounded-full text-sm transition-all outline-none border">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-[60%] text-gray-400"></i>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-8 bg-gray-100">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden min-h-[500px]">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-xs text-gray-500 uppercase font-bold sticky top-0 z-10">
                            <tr>
                                <th class="p-4 w-20">Imagen</th>
                                <th class="p-4">Producto</th>
                                <th class="p-4 text-center">Stock Total</th>
                                <th class="p-4">Precio</th>
                                <th class="p-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>



        <!-- REGISTRO VIEW (Hidden) -->
        <div id="registro-view"
            class="flex-1 h-full flex flex-col w-full relative hidden bg-gray-100 overflow-y-auto p-8">

            <!-- Filters Bar -->
            <div
                class="max-w-7xl mx-auto w-full mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="flex bg-gray-100 rounded-lg p-1">
                        <button onclick="setFilterMode('day')" id="filter-day"
                            class="px-4 py-1.5 rounded-md text-sm font-bold bg-white text-gray-900 shadow-sm transition-all">Día</button>
                        <button onclick="setFilterMode('month')" id="filter-month"
                            class="px-4 py-1.5 rounded-md text-sm font-bold text-gray-500 hover:text-gray-700 transition-all">Mes</button>
                    </div>
                    <div class="relative">
                        <input type="date" id="date-picker" onchange="renderAnalytics()"
                            class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-mint focus:border-mint block w-full p-2 pl-10">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i class="fa-solid fa-calendar"></i>
                        </div>
                    </div>
                    <div class="relative hidden" id="month-picker-container">
                        <input type="month" id="month-picker" onchange="renderAnalytics()"
                            class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-mint focus:border-mint block w-full p-2 pl-10">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i class="fa-solid fa-calendar-days"></i>
                        </div>
                    </div>
                </div>
                <div class="text-sm text-gray-400 italic">
                    <span id="showing-label">Mostrando registros de Hoy</span>
                </div>
            </div>

            <!-- Stats Cards (2 Columns now) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 max-w-7xl mx-auto w-full">
                <div
                    class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-gray-400 uppercase tracking-wide">Ventas</div>
                        <div id="stats-count" class="text-3xl font-bold text-gray-800 mt-1">0</div>
                    </div>
                    <div class="w-12 h-12 bg-mint/10 rounded-full flex items-center justify-center text-mint text-xl">
                        <i class="fa-solid fa-receipt"></i>
                    </div>
                </div>
                <div
                    class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-gray-400 uppercase tracking-wide">Ingresos</div>
                        <div id="stats-revenue" class="text-3xl font-bold text-gray-800 mt-1">$0</div>
                    </div>
                    <div
                        class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600 text-xl">
                        <i class="fa-solid fa-sack-dollar"></i>
                    </div>
                </div>
            </div>

            <!-- History Table -->
            <div class="max-w-7xl mx-auto w-full">
                <h3 class="font-bold text-xl text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> Historial de Ventas
                </h3>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-xs text-gray-500 uppercase font-bold sticky top-0">
                            <tr>
                                <th class="p-4">Fecha</th>
                                <th class="p-4">Detalle</th>
                                <th class="p-4 text-center">Items</th>
                                <th class="p-4 text-right">Total</th>
                            </tr>
                        </thead>
                        <tbody id="sales-history-body" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="overlay" onclick="closeDrawer()" class="hidden fixed inset-0 bg-black/40 z-40 backdrop-blur-sm"></div>

        <!-- Mini Cart Widget (Floating) -->
        <div id="mini-cart-widget" onclick="showOrderSummary()"
            class="fixed bottom-6 right-6 bg-gray-900 text-white p-4 rounded-2xl shadow-2xl cursor-pointer hover:scale-105 transition-transform z-30 hidden opacity-0 translate-y-10 duration-300 flex items-center gap-4 border border-gray-700">
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="mini-cart-count"
                    class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-gray-900">0</span>
            </div>
            <div>
                <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Tu Pedido</div>
                <div id="mini-cart-total" class="font-bold text-lg leading-none">$0</div>
            </div>
        </div>



        <!-- Import CSV Modal -->
        <div id="import-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-xl w-full max-w-md p-6 shadow-2xl relative">
                <button onclick="document.getElementById('import-modal').classList.add('hidden')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>

                <div class="text-center mb-6">
                    <div
                        class="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fa-solid fa-file-import"></i>
                    </div>
                    <h3 class="font-bold text-xl text-gray-900">Importar Stock Masivo</h3>
                    <p class="text-gray-500 mt-2 text-sm">Selecciona un archivo CSV para actualizar el inventario.</p>
                </div>

                <div class="mb-6">
                    <label
                        class="block w-full p-4 border-2 border-dashed border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer text-center transition group">
                        <input type="file" id="input-csv" accept=".csv" class="hidden">
                        <i
                            class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 group-hover:text-mint mb-2 transition"></i>
                        <div class="text-sm font-bold text-gray-600" id="file-name-display">Click para elegir archivo
                        </div>
                        <div class="text-xs text-gray-400 mt-1">Formato: id, name, price, stock...</div>
                    </label>
                </div>

                <button id="btn-cargar"
                    class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-black transition shadow-lg flex items-center justify-center gap-2">
                    <span id="btn-text">Subir Inventario</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div id="import-status" class="mt-4 text-center text-sm font-bold hidden"></div>
            </div>
        </div>

        <!-- Confirm Modal -->
        <div id="confirm-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-xl w-full max-w-md p-6 shadow-2xl scale-100 transition-transform">
                <div class="text-center mb-4">
                    <div
                        class="w-16 h-16 bg-yellow-100 text-mustard rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fa-solid fa-question"></i>
                    </div>
                    <h3 class="font-bold text-xl text-gray-900">¿Estás seguro?</h3>
                    <div id="confirm-msg" class="text-gray-500 mt-2 text-sm leading-relaxed"></div>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeConfirm(false)"
                        class="flex-1 px-4 py-3 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200">Cancelar</button>
                    <button onclick="closeConfirm(true)"
                        class="flex-1 px-4 py-3 bg-gray-900 text-white font-bold rounded-lg hover:bg-black">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <textarea id="code-output" class="hidden"></textarea>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="products.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="importar.js?v=2"></script>
    <script type="module" src="admin.js"></script>

</body>

</html>
